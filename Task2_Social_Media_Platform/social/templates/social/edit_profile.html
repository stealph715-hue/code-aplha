{% extends "base.html" %}
{% block title %}Edit Profile - Connectly{% endblock %}
{% block content %}
<div class="form-box">
    <h2>Edit your profile</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Save</button>
    </form>
</div>
{% endblock %}
