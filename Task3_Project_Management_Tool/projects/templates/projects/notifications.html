{% extends "base.html" %}
{% block title %}Notifications - TaskBoard{% endblock %}
{% block content %}
<h1>Notifications</h1>
{% for n in notifications %}
    <div class="notification {% if not n.is_read %}unread{% endif %}">
        <p>{{ n.message }}</p>
        <span class="comment-time">{{ n.created_at|timesince }} ago</span>
    </div>
{% empty %}
    <p>No notifications yet.</p>
{% endfor %}
{% endblock %}
